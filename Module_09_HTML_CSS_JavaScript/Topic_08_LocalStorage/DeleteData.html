<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Delete Local Storage</title>
    <script>
        function remove() {
            localStorage.removeItem('note');
            alert('Deleted');
        }
    </script>
</head>
<body>
    <button onclick="remove()">Delete Data</button>
</body>
</html>
