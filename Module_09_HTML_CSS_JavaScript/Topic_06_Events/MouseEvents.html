<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mouse Events</title>
</head>
<body>
    <button onmouseover="document.getElementById('status').textContent='Mouse over'" onmouseout="document.getElementById('status').textContent='Mouse out'">Hover Me</button>
    <p id="status"></p>
</body>
</html>
