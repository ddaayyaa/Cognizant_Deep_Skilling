<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Grid Demo</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .item { background: #f0f0f0; padding: 10px; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
</body>
</html>
